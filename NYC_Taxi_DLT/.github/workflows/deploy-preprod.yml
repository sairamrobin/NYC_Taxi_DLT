name: Deploy — Preprod

# Triggered when a PR is merged into the `preprod` branch.
# Deploys the bundle to the 'preprod' target automatically.
on:
  push:
    branches:
      - preprod

jobs:
  deploy-preprod:
    name: Deploy to Preprod
    runs-on: ubuntu-latest
    # No GitHub Environment scoping needed — single PAT covers all targets

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Databricks CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh
          databricks version

      - name: Build Python wheel
        run: uv build --wheel

      - name: Validate bundle (preprod)
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: databricks bundle validate -t preprod

      - name: Deploy bundle (preprod)
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: databricks bundle deploy -t preprod

      # (Optional) Sync the linked Databricks Repo / git folder to the merged commit.
      # Uncomment and set DATABRICKS_REPO_PATH_PREPROD secret if you have a linked workspace git folder.
      #
      # - name: Sync Databricks Repo (preprod)
      #   env:
      #     DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      #     DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
      #   run: |
      #     databricks repos update ${{ secrets.DATABRICKS_REPO_PATH_PREPROD }} \
      #       --branch preprod
