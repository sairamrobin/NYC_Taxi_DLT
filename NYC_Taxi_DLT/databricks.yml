# This is a Databricks asset bundle definition for NYC_Taxi_DLT.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: NYC_Taxi_DLT
  uuid: 317fd609-9ed8-4f84-a1e8-9da57d4b5f47

include:
  - resources/*.yml

artifacts:
  python_artifact:
    type: whl
    build: uv build --wheel

# Variable declarations. These variables are assigned in the dev/preprod/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-c4b8c8d6-ec5b.cloud.databricks.com
    variables:
      catalog: dlt_dev
      schema: dev
  preprod:
    mode: preprod
    workspace:
      host: https://dbc-c4b8c8d6-ec5b.cloud.databricks.com
    variables:
      catalog: dlt_preprod
      schema: preprod
      permissions:
      - user_name: sairam1610345@gmail.com
        level: CAN_MANAGE
  prod:
    mode: production
    workspace:
      host: https://dbc-c4b8c8d6-ec5b.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/sairam1610345@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/sairam1610345@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: dlt_default
      schema: prod
    permissions:
      - user_name: sairam1610345@gmail.com
        level: CAN_MANAGE
