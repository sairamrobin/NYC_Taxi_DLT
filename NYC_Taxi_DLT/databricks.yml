# This is a Databricks asset bundle definition for NYC_Taxi_DLT.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: NYC_Taxi_DLT
  # uuid: 317fd609-9ed8-4f84-a1e8-9da57d4b5f47

include:
  - resources/*.yml

artifacts:
  python_artifact:
    type: whl
    build: uv build --wheel

# Variable declarations. These variables are assigned in the dev/preprod/prod targets below..
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    mode: development
    presets:
      name_prefix: "[dev][${workspace.current_user.short_name}]"
    default: true
    workspace:
      host: https://dbc-c4b8c8d6-ec5b.cloud.databricks.com
      root_path: /Workspace/Users/sairam1610345@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: dlt_dev
      schema: dev
    permissions:
      - user_name: sairam1610345@gmail.com
        level: CAN_MANAGE

  preprod:
    # mode must be 'development' or 'production' — 'preprod' is not a valid DAB mode
    mode: production
    presets:
      name_prefix: "[preprod]"
    workspace:
      host: https://dbc-c4b8c8d6-ec5b.cloud.databricks.com
      root_path: /Workspace/Users/sairam1610345@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: dlt_preprod
      schema: preprod
    permissions:
      - user_name: sairam1610345@gmail.com
        level: CAN_MANAGE

  prod:
    mode: production
    presets:
      name_prefix: "[prod]"
    workspace:
      host: https://dbc-c4b8c8d6-ec5b.cloud.databricks.com
      # Explicit root path ensures a single canonical copy in production
      root_path: /Workspace/Users/sairam1610345@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: dlt_prod
      schema: prod
    permissions:
      - user_name: sairam1610345@gmail.com
        level: CAN_MANAGE
