# The main pipeline for NYC_Taxi_DLT

resources:
  pipelines:
    NYC_Taxi_DLT_etl:
      name: NYC_Taxi_DLT_etl
      catalog: ${var.catalog}
      schema: ${var.schema}
      serverless: true
      root_path: "../src/NYC_Taxi_DLT_etl"

      libraries:
        - glob:
            include: ../src/NYC_Taxi_DLT_etl/transformations/**

      environment:
        dependencies:
          # We include every dependency defined by pyproject.toml by defining an editable environment
          # that points to the folder where pyproject.toml is deployed.
          - --editable ${workspace.file_path}
